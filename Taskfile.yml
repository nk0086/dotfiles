# https://taskfile.dev

version: '3'

vars:
  GREETING: Hello, World!

tasks:
  default:
    cmds:
      - echo "{{.GREETING}}"
    silent: true

  format:nix:
    desc: "Format all Nix files with alejandra"
    sources:
      - "**/*.nix"
    cmds:
      - find . -name '*.nix' | xargs alejandra

  format:lua:
    desc: "Format all Lua files with stylua"
    sources:
      - "**/*.lua"
    cmds:
      - find . -name '*.lua' | xargs stylua

  format:
    desc: "Format all Nix and Lua files"
    deps: [format:nix, format:lua]

  check:nix:
    desc: "Check Nix formatting (dry-run)"
    cmds:
      - find . -name '*.nix' | xargs alejandra --check

  check:lua:
    desc: "Check Lua formatting (dry-run)"
    cmds:
      - find . -name '*.lua' | xargs stylua --check

  check:
    desc: "Check formatting for all files"
    deps: [check:nix, check:lua]
