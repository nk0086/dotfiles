font_size 14.0
font_family FiraCode 
# 
background_opacity 0.8

# タブのデザイン
tab_bar_style powerline
active_tab_foreground   #000
active_tab_background   #ffc2e0
active_tab_font_style   bold-italic
inactive_tab_foreground #444
inactive_tab_background #fee0e0
inactive_tab_font_style normal
tab_bar_background      #fef4f4

# ターミナル背景画像
# background_image ~/Pictures/rily.png
background_image_layout tiled
background_tint 0.6


kitty_mod super
clear_all_shortcuts no

# Window
map kitty_mod+s new_window_with_cwd
map kitty_mod+shift+w close_window
map kitty_mod+shift+j next_window
map kitty_mod+shift+k previous_window
map kitty_mod+shift+m next_layout
map kitty_mod+shift+r resize_window

# tab
map kitty_mod+shift+q close_tab
map kitty_mod+shift+t new_tab_with_cwd
map kitty_mod+shift+n next_tab
map kitty_mod+shift+p previous_tab


#スクロール
map kitty_mod+j scroll_line_down
map kitty_mod+k scroll_line_up
map kitty_mod+u scroll_page_up
map kitty_mod+d scroll_page_down
